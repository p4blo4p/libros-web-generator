<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Libros</title>
</head>
<body>
    <h1>Lista de Libros</h1>
    <ul>
        {% for libro in libros %}
        <li>
            <a href="libros/{{ libro['book_id'] }}.html">
                {{ libro['book_title'] }} por {{ libro['author'] }}
            </a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
